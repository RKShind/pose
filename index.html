<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>POSE.AI — Smart Selfie Director</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 50%, #0a0a12 100%);
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #e8e0d5;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* HEADER */
    #header {
      width: 100%;
      padding: 20px 24px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,200,100,0.12);
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #header .logo { font-size: 22px; font-weight: 700; letter-spacing: 0.05em; color: #f0d080; }
    #header .sub  { font-size: 11px; letter-spacing: 0.2em; color: #888; text-transform: uppercase; }
    #flip-btn {
      background: rgba(255,200,80,0.1);
      border: 1px solid rgba(255,200,80,0.3);
      color: #f0d080;
      border-radius: 50%;
      width: 40px; height: 40px;
      cursor: pointer; font-size: 18px;
      display: none; align-items: center; justify-content: center;
    }

    /* CAMERA */
    #camera-wrap {
      width: 100%; max-width: 480px;
      position: relative;
      aspect-ratio: 3/4;
      background: #000;
      overflow: hidden;
    }
    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    #placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      background: linear-gradient(180deg, #0a0a12, #0f0f20);
    }
    #placeholder .cam-icon { font-size: 60px; opacity: 0.4; }
    #placeholder p { color: #aaa; font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; }

    /* Grid overlay */
    #grid { position: absolute; inset: 0; pointer-events: none; display: none; }
    .vline { position: absolute; top: 0; bottom: 0; border-left: 1px solid rgba(255,255,255,0.1); }
    .hline { position: absolute; left: 0; right: 0; border-top: 1px solid rgba(255,255,255,0.1); }

    /* Badges */
    #scan-badge {
      display: none;
      position: absolute; top: 12px; left: 12px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(240,208,128,0.4);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 11px; color: #f0d080;
      letter-spacing: 0.15em; text-transform: uppercase;
      backdrop-filter: blur(8px);
    }
    #scene-badge {
      display: none;
      position: absolute; bottom: 12px; left: 12px; right: 12px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 12px; color: #ccc; line-height: 1.5;
      border: 1px solid rgba(255,255,255,0.08);
    }
    #scene-badge span { color: #f0d080; margin-right: 6px; }

    /* CONTROLS */
    #controls {
      width: 100%; max-width: 480px;
      padding: 20px 20px 0;
      display: flex; gap: 12px; justify-content: center;
    }
    #start-btn {
      flex: 1;
      background: linear-gradient(135deg, #c8a840, #f0d080);
      color: #0a0a0a;
      border: none; border-radius: 14px;
      padding: 16px; font-size: 15px;
      font-weight: 700; letter-spacing: 0.08em;
      cursor: pointer; font-family: inherit;
    }
    #shutter-btn {
      display: none;
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #c8a840, #f0d080);
      border: 4px solid rgba(255,255,255,0.2);
      border-radius: 50%; cursor: pointer;
      font-size: 24px; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    #reanalyze-btn {
      display: none;
      flex: 1;
      background: rgba(255,200,80,0.1);
      border: 1px solid rgba(255,200,80,0.3);
      color: #f0d080; border-radius: 14px;
      padding: 14px; font-size: 13px;
      letter-spacing: 0.1em; cursor: pointer;
      text-transform: uppercase; font-family: inherit;
    }
    #stop-btn {
      display: none;
      width: 48px; height: 48px; align-self: center;
      background: rgba(255,80,80,0.15);
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 12px; color: #ff8080;
      cursor: pointer; font-size: 18px;
      align-items: center; justify-content: center;
    }

    /* POSES */
    #poses-section { width: 100%; max-width: 480px; padding: 20px; }
    .poses-header {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.2em; color: #666;
      margin-bottom: 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .poses-header span { color: #f0d080; }
    #pose-list { display: flex; flex-direction: column; gap: 10px; }

    .pose-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; padding: 16px;
      cursor: pointer; text-align: left;
      color: inherit; font-family: inherit;
      transition: all 0.2s ease; width: 100%;
    }
    .pose-card.active {
      background: linear-gradient(135deg, rgba(240,208,128,0.15), rgba(200,168,64,0.08));
      border-color: rgba(240,208,128,0.4);
    }
    .pose-card .row { display: flex; align-items: center; gap: 12px; }
    .pose-card .emoji { font-size: 28px; flex-shrink: 0; }
    .pose-card .info { flex: 1; min-width: 0; }
    .pose-card .pname { font-weight: 700; font-size: 15px; color: #e8e0d5; margin-bottom: 4px; }
    .pose-card.active .pname { color: #f0d080; }
    .pose-card .ptip { font-size: 13px; color: #999; line-height: 1.4; }
    .pose-card .check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid #333; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #000;
    }
    .pose-card.active .check { background: #f0d080; border-color: #f0d080; }
    .pose-detail {
      display: none;
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid rgba(240,208,128,0.15);
      font-size: 13px; color: #b0a080; line-height: 1.6;
    }
    .pose-card.active .pose-detail { display: block; }

    /* ACTIVE GUIDE */
    #active-guide {
      width: calc(100% - 40px); max-width: 440px;
      margin: 0 20px 30px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(240,208,128,0.08), rgba(200,168,64,0.04));
      border: 1px solid rgba(240,208,128,0.2);
      border-radius: 20px; text-align: center;
    }
    #active-guide .big-icon { font-size: 40px; margin-bottom: 8px; }
    #active-guide .guide-name { font-size: 18px; font-weight: 700; color: #f0d080; margin-bottom: 6px; }
    #active-guide .guide-detail { font-size: 14px; color: #ccc; line-height: 1.6; max-width: 320px; margin: 0 auto; }

    /* ERROR */
    #error-toast {
      display: none;
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(255,80,80,0.15);
      border: 1px solid rgba(255,80,80,0.3);
      color: #ff8080; border-radius: 12px;
      padding: 12px 20px; font-size: 13px;
      max-width: 340px; text-align: center; z-index: 100;
    }

    #canvas { display: none; }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div>
    <div class="logo">POSE.AI</div>
    <div class="sub">Smart Selfie Director</div>
  </div>
  <button id="flip-btn" onclick="flipCamera()">⇄</button>
</div>

<!-- CAMERA -->
<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="placeholder">
    <div class="cam-icon">📸</div>
    <p>Ready for your close-up?</p>
  </div>
  <div id="grid">
    <div class="vline" style="left:33.3%"></div>
    <div class="vline" style="left:66.6%"></div>
    <div class="hline" style="top:33.3%"></div>
    <div class="hline" style="top:66.6%"></div>
  </div>
  <div id="scan-badge">◉ Scanning Scene...</div>
  <div id="scene-badge"><span>◎</span><span id="scene-text"></span></div>
</div>
<canvas id="canvas"></canvas>

<!-- CONTROLS -->
<div id="controls">
  <button id="start-btn" onclick="startCamera()">✦ Start Camera</button>
  <button id="shutter-btn" onclick="takePhoto()">📸</button>
  <button id="reanalyze-btn" onclick="runAnalysis()">Re-analyze ↻</button>
  <button id="stop-btn" onclick="stopCamera()">✕</button>
</div>

<!-- POSES -->
<div id="poses-section">
  <div class="poses-header">
    <span style="color:#666;letter-spacing:0.2em;text-transform:uppercase;font-size:11px;">Recommended Poses</span>
    <span id="pose-count"></span>
  </div>
  <div id="pose-list"></div>
</div>

<!-- ACTIVE GUIDE -->
<div id="active-guide">
  <div class="big-icon" id="guide-icon"></div>
  <div class="guide-name" id="guide-name"></div>
  <div class="guide-detail" id="guide-detail"></div>
</div>

<div id="error-toast"></div>

<script>
const POSES = {
  nature: [
    { name:"The Wanderer", icon:"🌿", tip:"Turn 45° to the side, look into the distance", detail:"Use the rule of thirds — place yourself off-center to let the nature breathe around you." },
    { name:"Golden Hour Glow", icon:"🌅", tip:"Face slightly away from light source", detail:"Let the light rim your silhouette. Tilt chin slightly down for a natural, warm look." },
    { name:"Candid Explorer", icon:"🍃", tip:"Crouch near foliage, look up at camera", detail:"Lower angle + greenery above creates an immersive, magazine-worthy composition." },
  ],
  urban: [
    { name:"Street Editorial", icon:"🏙️", tip:"Stand parallel to architecture lines", detail:"Align your body with the leading lines of buildings for a geometric, editorial feel." },
    { name:"Candid City", icon:"🚶", tip:"Walk toward camera, slight smile", detail:"Motion adds life. Take mid-stride with one foot forward for dynamic energy." },
    { name:"Urban Lean", icon:"🧱", tip:"Lean against wall, arms crossed loosely", detail:"Negative space on one side balances the composition and adds depth." },
  ],
  indoor: [
    { name:"Soft Natural Light", icon:"🪟", tip:"Face toward window, 45° angle", detail:"Window light is the most flattering. Keep it hitting one side of your face for soft definition." },
    { name:"Cozy Corner", icon:"☕", tip:"Sit diagonally, look slightly off-camera", detail:"Diagonal body position slims and adds intrigue. Eyes slightly away = thoughtful vibe." },
    { name:"Flat Lay Face", icon:"📚", tip:"Shoot from above, look straight up", detail:"Overhead shot with surrounding props creates a curated, lifestyle aesthetic." },
  ],
  beach: [
    { name:"Shoreline Silhouette", icon:"🌊", tip:"Face the horizon, arms out slightly", detail:"Stand at the water's edge, golden hour preferred. Arms relaxed at side or slightly open." },
    { name:"Sandy Layback", icon:"🏖️", tip:"Lie back on sand, camera overhead", detail:"Overhead angle + textured sand creates an effortlessly cool composition." },
    { name:"Wave Chaser", icon:"🌀", tip:"Run toward camera as wave approaches", detail:"Action shots at the shore with water in motion feel alive and joyful." },
  ],
  sky: [
    { name:"Cloud Dreamer", icon:"☁️", tip:"Look up into the sky, camera below", detail:"Low angle + dramatic sky = cinematic. Great with golden hour or storm clouds." },
    { name:"Jump Shot", icon:"✨", tip:"Jump with arms wide, clouds behind", detail:"Time the jump at peak. Keep legs slightly bent for a natural arc look." },
    { name:"Horizon Gaze", icon:"🌄", tip:"Profile against sky, chin up slightly", detail:"Side profile with open sky behind creates a powerful, aspirational mood." },
  ],
  default: [
    { name:"Power Pose", icon:"💪", tip:"Stand tall, shoulders back, slight smile", detail:"Confidence is the best accessory. Square shoulders, slight chin tuck for definition." },
    { name:"Candid Catch", icon:"😄", tip:"Look slightly off-camera, genuine laugh", detail:"Natural expressions beat forced smiles. Think of something funny right before the shot." },
    { name:"Classic Portrait", icon:"🎭", tip:"Face camera directly, soft expression", detail:"Clean, timeless. Ensure lighting is even on both sides of your face." },
  ],
};

const KEYWORDS = {
  nature: ["tree","plant","forest","grass","garden","leaf","outdoor","mountain","flower","green"],
  urban: ["building","street","city","wall","road","architecture","sidewalk","urban","concrete","brick"],
  indoor: ["room","window","indoor","furniture","couch","chair","shelf","kitchen","office","bedroom"],
  beach: ["beach","sand","ocean","sea","wave","water","coast","shore"],
  sky: ["sky","cloud","sunset","sunrise","horizon","dusk","dawn"],
};

let stream = null, analyzing = false, facingMode = "user", analysisTimer = null, activePose = 0, currentPoses = POSES.default;

function show(id, display="flex") { document.getElementById(id).style.display = display; }
function hide(id) { document.getElementById(id).style.display = "none"; }

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode, width:{ideal:1280}, height:{ideal:720} }, audio: false });
    const video = document.getElementById("video");
    video.srcObject = stream;
    video.style.display = "block";
    video.style.transform = facingMode === "user" ? "scaleX(-1)" : "none";
    hide("placeholder");
    show("grid", "block");
    show("flip-btn");
    hide("start-btn");
    show("shutter-btn");
    show("reanalyze-btn");
    show("stop-btn");
    runAnalysis();
    analysisTimer = setInterval(runAnalysis, 12000);
  } catch(e) {
    showError("Camera access denied. Please allow camera permissions.");
  }
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  clearInterval(analysisTimer);
  const video = document.getElementById("video");
  video.style.display = "none";
  show("placeholder", "flex");
  hide("grid");
  hide("flip-btn");
  show("start-btn", "flex");
  hide("shutter-btn");
  hide("reanalyze-btn");
  hide("stop-btn");
  hide("scan-badge");
  hide("scene-badge");
  stream = null;
}

function flipCamera() {
  facingMode = facingMode === "user" ? "environment" : "user";
  stopCamera();
  setTimeout(startCamera, 300);
}

function captureFrame() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  if (!video || video.readyState < 2) return null;
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);
  return canvas.toDataURL("image/jpeg", 0.7).split(",")[1];
}

function takePhoto() {
  const frame = captureFrame();
  if (!frame) return;
  const img = new Image();
  img.src = "data:image/jpeg;base64," + frame;
  img.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:5;";
  const wrap = document.getElementById("camera-wrap");
  const old = wrap.querySelector(".photo-preview");
  if (old) old.remove();
  img.className = "photo-preview";
  wrap.appendChild(img);
  setTimeout(() => img.remove(), 3000);
}

async function runAnalysis() {
  if (analyzing) return;
  const frame = captureFrame();
  if (!frame) return;
  analyzing = true;
  show("scan-badge", "block");
  hide("scene-badge");
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            { type: "image", source: { type: "base64", media_type: "image/jpeg", data: frame } },
            { type: "text", text: "Analyze this selfie camera frame. Describe the background in 1 sentence. Then on a new line write: SCENE: followed by one word only from: nature, urban, indoor, beach, sky, default." }
          ]
        }]
      })
    });
    const data = await response.json();
    const text = (data.content || []).map(c => c.text || "").join("\n");
    const sceneMatch = text.match(/SCENE:\s*(\w+)/i);
    const scene = sceneMatch ? sceneMatch[1].toLowerCase() : "default";
    const desc = text.split("\n")[0] || "Scene detected.";
    currentPoses = POSES[scene] || POSES.default;
    activePose = 0;
    document.getElementById("scene-text").textContent = desc;
    show("scene-badge", "block");
    renderPoses();
  } catch(e) {
    currentPoses = POSES.default;
    renderPoses();
  }
  hide("scan-badge");
  analyzing = false;
}

function renderPoses() {
  const list = document.getElementById("pose-list");
  document.getElementById("pose-count").textContent = currentPoses.length + " suggestions";
  list.innerHTML = "";
  currentPoses.forEach((p, i) => {
    const card = document.createElement("button");
    card.className = "pose-card" + (i === activePose ? " active" : "");
    card.innerHTML = `
      <div class="row">
        <div class="emoji">${p.icon}</div>
        <div class="info">
          <div class="pname">${p.name}</div>
          <div class="ptip">${p.tip}</div>
        </div>
        <div class="check">${i === activePose ? "✓" : ""}</div>
      </div>
      <div class="pose-detail">💡 ${p.detail}</div>
    `;
    card.onclick = () => { activePose = i; renderPoses(); };
    list.appendChild(card);
  });
  const pose = currentPoses[activePose];
  document.getElementById("guide-icon").textContent = pose.icon;
  document.getElementById("guide-name").textContent = pose.name;
  document.getElementById("guide-detail").textContent = pose.detail;
}

function showError(msg) {
  const el = document.getElementById("error-toast");
  el.textContent = msg;
  el.style.display = "block";
  setTimeout(() => el.style.display = "none", 4000);
}

// Init
renderPoses();
</script>
</body>
</html>
